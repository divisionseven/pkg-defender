name: 📦 Dependency Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Review Dependency Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          # Fail on any vulnerability with CVSS score >= 7.0 (High or Critical)
          fail-on-severity: high
          # Comment on the PR with a summary of findings
          comment-summary-in-pr: always
          # Allowed licenses (implicitly denies all others, including GPL-3.0 and AGPL-3.0)
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0, PSF-2.0
