name: 📸 Publish Snapshot

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch: # Manual trigger
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Build snapshot database
        run: uv run python scripts/build_snapshot.py --output threats.db
        env:
          PKGD_GITHUB_TOKEN: ${{ secrets.GHSA_TOKEN }}
      - name: Compress database
        run: gzip threats.db
      - name: Generate SHA256 checksum
        run: sha256sum threats.db.gz > threats.db.gz.sha256
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: snapshot-files
          path: |
            threats.db.gz
            threats.db.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: snapshot-files
      - name: Rename files for release
        run: |
          mv threats.db.gz threats-latest.db.gz
          mv threats.db.gz.sha256 threats-latest.db.gz.sha256
      - name: Render release body
        run: |
          python3 .github/scripts/render-snapshot-body.py \
            --template .github/release-templates/snapshot-body.md \
            --db threats-latest.db.gz \
            --output /tmp/snapshot-body.md
      - name: Delete old release (forces fresh publish date)
        run: gh release delete snapshot-latest --yes --repo ${{ github.repository }} || true
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Create fresh release
        run: |
          cat /tmp/snapshot-body.md | gh release create snapshot-latest \
            --repo ${{ github.repository }} \
            --title "Threat Intelligence Snapshot — $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --notes-file - \
            --latest=false \
            threats-latest.db.gz threats-latest.db.gz.sha256
        env:
          GH_TOKEN: ${{ github.token }}
