name: Snapshot

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch: # Manual trigger
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          python-version: "3.12"
      - name: Install npm for npm audit
        run: sudo apt-get update && sudo apt-get install -y npm
      - name: Install dependencies
        run: uv sync
      - name: Build snapshot database
        run: python scripts/build_snapshot.py --output threats.db
      - name: Compress database
        run: gzip threats.db
      - name: Generate SHA256 checksum
        run: sha256sum threats.db.gz > threats.db.gz.sha256
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: snapshot-files
          path: |
            threats.db.gz
            threats.db.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: snapshot-files
      - name: Rename files for release
        run: |
          mv threats.db.gz threats-latest.db.gz
          mv threats.db.gz.sha256 threats-latest.db.gz.sha256
      - name: Create or update release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: |
            threats-latest.db.gz
            threats-latest.db.gz.sha256
          tag_name: snapshot-latest
          draft: false
